<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STS-45 — Realtime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

  <div class="rt-view" id="rtView">
    <div class="rt-overlay">
      <!-- end icon (top-left) -->
      <button class="rt-gear rt-end" id="rtEndBtn" onclick="toggleRealtime()" title="End session" aria-label="End session">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="square">
          <path d="M16 4 L16 14"/>
          <path d="M9 8 A10 10 0 1 0 23 8"/>
        </svg>
      </button>



      <div class="rt-brand">
        <div class="brand-mark"><span></span><span></span><span></span><span></span></div>
        <span class="brand-name">STS-45 · Realtime</span>
      </div>

      <div class="rt-viz-wrap" id="rtVizWrap" onclick="toggleRealtime()">
        <div class="rt-ring1" id="rtRing1"></div>
        <div class="rt-pulse-ring rt-pulse-out" id="rtPulseOut"></div>
        <div class="rt-pulse-dot" id="rtPulseIn"></div>
      </div>

      <div class="rt-state" id="rtState"></div>

      <div class="rt-transcript" id="rtTranscript"></div>

      <div class="rt-filler"></div>
    </div>
  </div>

  <!-- Settings drawer -->
  <div id="settingsPanel" class="settings-panel hidden">
    <div class="settings-head">
      <span>Config</span>
      <button class="modal-close" onclick="toggleSettings()" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="phead">// system preferences</div>
    <div class="settings-body">
      <div class="field"><div class="field-lbl">Voice</div><div class="select-wrap"><select id="voice">
        <option value="en_US-lessac-medium">Lessac · EN female</option>
        <option value="en_US-amy-low">Amy · EN female</option>
        <option value="en_US-libritts-high">LibriTTS · EN female</option>
        <option value="en_US-ryan-high">Ryan · EN male</option>
        <option value="en_US-joe-medium">Joe · EN male</option>
        <option value="en_US-kusal-medium">Kusal · EN male</option>
        <option value="en_GB-alan-medium">Alan · UK male</option>
        <option value="en_GB-semaine-medium">Semaine · UK female</option>
        <option value="pt_BR-faber-medium">Faber · BR male</option>
        <option value="es_ES-carlfm-x_low">Carl · ES male</option>
        <option value="fr_FR-siwis-medium">Siwis · FR female</option>
        <option value="de_DE-thorsten-medium">Thorsten · DE male</option>
        <option value="it_IT-paola-medium">Paola · IT female</option>
      </select></div></div>
      <div class="field"><div class="field-lbl">Language</div><div class="select-wrap"><select id="lang">
        <option value="en">EN · English</option><option value="pt">PT · Portuguese</option><option value="es">ES · Spanish</option><option value="fr">FR · French</option><option value="de">DE · German</option><option value="ja">JP · Japanese</option><option value="ko">KO · Korean</option>
      </select></div></div>
      <div class="slider-row"><div class="slider-label"><span class="slider-name">Max tokens</span><span class="slider-val" id="maxTokensVal">512</span></div><input type="range" id="maxTokens" min="64" max="4096" step="64" value="512" oninput="document.getElementById('maxTokensVal').textContent=this.value; updateSlider(this)"></div>
      <hr class="divider">
      <div class="field"><div class="field-lbl">System prompt</div><textarea class="field-area" id="sysPrompt" rows="3" placeholder="Instructions for the assistant…"></textarea></div>
    </div>
    <div class="settings-foot">
      <span class="settings-hint" id="settingsHint">saved automatically</span>
    </div>
  </div>

  <script id="boot" type="application/json">{
    "ws_port": {{ ws_port }}
  }</script>
  <script src="/static/app.js"></script>
</body>
</html>
