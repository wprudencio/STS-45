services:
  chat:
    build: .
    container_name: supertonic-chat
    ports:
      - "7777:7777"
    volumes:
      # Persist HuggingFace model cache (avoids re-downloading ~260MB on rebuild)
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: python3 chat_ui.py --host 0.0.0.0 --port 7777 --stt-api http://parakeet:8080 --api http://host.docker.internal:8080/v1/chat/completions
    depends_on:
      - parakeet

  parakeet:
    image: ghcr.io/mudler/parakeet.cpp-server:latest
    container_name: supertonic-stt
    ports:
      - "8081:8080"
    volumes:
      - ./models:/models:ro
    command: --model /models/tdt-0.6b-v2-q4_k.gguf
    restart: unless-stopped

volumes:
  hf_cache:
