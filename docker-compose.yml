services:
  chat:
    build: .
    container_name: supertonic-chat
    ports:
      - "7777:7777"
    volumes:
      # Persist HuggingFace model cache (avoids re-downloading ~260MB on rebuild)
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: python3 chat_ui.py --host 0.0.0.0 --port 7777 --stt-api http://parakeet:8080
    depends_on:
      - parakeet

  parakeet:
    image: ghcr.io/mudler/parakeet.cpp-server:latest
    container_name: supertonic-stt
    ports:
      - "8081:8080"
    volumes:
      - stt_models:/models
    command: >-
      sh -c "
        [ -f /models/tdt_ctc-110m-q5_k.gguf ] ||
        wget -q --show-progress -O /models/tdt_ctc-110m-q5_k.gguf
        https://huggingface.co/mudler/parakeet-cpp-gguf/resolve/main/tdt_ctc-110m-q5_k.gguf;
        exec parakeet-server --model /models/tdt_ctc-110m-q5_k.gguf
      "
    restart: unless-stopped

volumes:
  hf_cache:
  stt_models:
