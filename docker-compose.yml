services:
  llama:
    build: .
    image: supertonic-llama
    container_name: supertonic-llama
    ports:
      - "8080:8080"   # llama.cpp web UI (OpenAI-compatible API + playground)
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      # Optional: HF_TOKEN if you ever swap to a gated repo
      # - HF_TOKEN=${HF_TOKEN}
    command: >
      llama serve
        --hf unsloth/gemma-4-E2B-it-qat-GGUF:UD-Q4_K_XL
        --host 0.0.0.0
        --port 8080
    restart: unless-stopped
    # Uncomment for NVIDIA GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  chat:
    build: .
    image: supertonic-chat
    container_name: supertonic-chat
    ports:
      - "7777:7777"
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: >
      python3 chat_ui.py
        --host 0.0.0.0
        --port 7777
        --stt-api http://parakeet:8080
        --api http://llama:8080/v1/chat/completions
    depends_on:
      - parakeet
      - llama

  parakeet:
    image: ghcr.io/mudler/parakeet.cpp-server:latest
    container_name: supertonic-stt
    ports:
      - "8081:8080"
    volumes:
      - ./models:/models:ro
    command: --model /models/tdt_ctc-110m-q5_k.gguf
    restart: unless-stopped

volumes:
  hf_cache:
