services:
  chat:
    build: .
    container_name: supertonic-chat
    ports:
      - "7777:7777"
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # Use realtime_server.py for orb-based realtime voice (WebSocket pipeline).
    # Swap to chat_ui.py for the classic PTT + SSE text-chat UI.
    command: python3 realtime_server.py --host 0.0.0.0 --port 7777 --stt-api http://parakeet:8080 --api http://host.docker.internal:8080/v1/chat/completions
    depends_on:
      - parakeet

  parakeet:
    image: ghcr.io/mudler/parakeet.cpp-server:latest
    container_name: supertonic-stt
    ports:
      - "8081:8080"
    volumes:
      - ./models:/models:ro
    command: --model /models/tdt_ctc-110m-q5_k.gguf
    restart: unless-stopped

volumes:
  hf_cache:
