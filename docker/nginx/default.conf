# STS-45 unified reverse proxy (local, no Docker)
# Nginx listens on :7777 and proxies:
#   /    → Flask app (port 7778)
#   /ws  → WebSocket server (port 7779)

upstream sts45_flask {
    server 127.0.0.1:7778;
}

upstream sts45_ws {
    server 127.0.0.1:7779;
}

server {
    listen 7777;
    server_name _;

    client_max_body_size 10m;

    # WebSocket — must come before the catch-all
    location /ws {
        proxy_pass http://sts45_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # Everything else → Flask
    location / {
        proxy_pass http://sts45_flask;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
